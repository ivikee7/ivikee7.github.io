<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Dynamic Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dropdown:hover .dropdown-menu { display: block; }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1507676184212-d03ab07a01bf?q=80&w=2070'); background-size: cover; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <nav class="flex justify-between items-center p-6 bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="flex items-center space-x-10">
            <h1 class="text-2xl font-bold text-red-600 tracking-tighter">THEATRE<span class="text-white">OS</span></h1>
            
            <div class="hidden md:flex space-x-6 items-center">
                <a href="/" class="hover:text-red-500 transition text-sm uppercase font-bold">Home</a>
                
                <div class="relative dropdown">
                    <button class="flex items-center hover:text-red-500 transition text-sm uppercase font-bold outline-none">
                        Productions <i class="fas fa-chevron-down ml-2 text-xs"></i>
                    </button>
                    <ul id="dynamic-menu" class="dropdown-menu absolute hidden bg-zinc-900 border border-zinc-800 w-48 py-2 mt-0 rounded-md shadow-xl">
                        <li class="px-4 py-2 text-zinc-500 text-xs italic">Loading shows...</li>
                    </ul>
                </div>
            </div>
        </div>
        <button class="bg-red-600 px-5 py-2 rounded text-sm font-bold">MEMBER LOGIN</button>
    </nav>

    <header class="hero-bg h-[60vh] flex flex-col justify-center items-center text-center">
        <h2 class="text-5xl font-serif mb-4">Automated Stage Management</h2>
        <p class="text-zinc-400 max-w-lg">This homepage automatically syncs with your GitHub subdirectories to generate navigation menus in real-time.</p>
    </header>

    <main class="max-w-6xl mx-auto py-16 px-6">
        <h3 class="text-2xl font-bold mb-8 border-l-4 border-red-600 pl-4">Detected Sub-Directories</h3>
        <div id="dir-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // CONFIGURATION: Replace with your GitHub details
        const GITHUB_USER = 'YOUR_USERNAME'; 
        const GITHUB_REPO = 'YOUR_REPO_NAME';

        async function fetchDirectories() {
            const menuContainer = document.getElementById('dynamic-menu');
            const gridContainer = document.getElementById('dir-grid');
            
            try {
                // Fetch repository contents from GitHub API
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                const items = await response.json();

                // Filter only for directories (folders)
                const directories = items.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

                if (directories.length === 0) {
                    menuContainer.innerHTML = '<li class="px-4 py-2 text-zinc-500">No sub-pages found</li>';
                    return;
                }

                // Clear "Loading" placeholder
                menuContainer.innerHTML = '';

                directories.forEach(dir => {
                    const pageUrl = `/${GITHUB_REPO}/${dir.name}/`;

                    // 1. Add to Navigation Dropdown
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${pageUrl}" class="block px-4 py-2 hover:bg-red-600 hover:text-white transition capitalize">${dir.name.replace(/-/g, ' ')}</a>`;
                    menuContainer.appendChild(li);

                    // 2. Add to Main Grid Card
                    const card = document.createElement('div');
                    card.className = "bg-zinc-900 p-6 rounded-lg border border-zinc-800 hover:border-red-600 transition group cursor-pointer";
                    card.onclick = () => window.location.href = pageUrl;
                    card.innerHTML = `
                        <i class="fas fa-folder text-red-600 mb-4 text-2xl group-hover:scale-110 transition"></i>
                        <h4 class="text-xl font-bold capitalize mb-2">${dir.name.replace(/-/g, ' ')}</h4>
                        <p class="text-zinc-500 text-sm">Explore the contents of the ${dir.name} production folder.</p>
                    `;
                    gridContainer.appendChild(card);
                });

            } catch (error) {
                console.error("Error fetching directories:", error);
                menuContainer.innerHTML = '<li class="px-4 py-2 text-red-500">API Limit Reached</li>';
            }
        }

        fetchDirectories();
    </script>
</body>
</html>
